# --------------------------------------------------------------------------
# Fly.io — Bridge Server deployment
# --------------------------------------------------------------------------
# IMPORTANT: Set VALID_ROOMS and ANTHROPIC_API_KEY via fly secrets:
#   fly secrets set VALID_ROOMS="uuid1,uuid2,uuid3,uuid4,uuid5"
#   fly secrets set ANTHROPIC_API_KEY="sk-ant-..."
# Do NOT put secrets in [env] below.
# --------------------------------------------------------------------------

app = "wfa-bridge"
primary_region = "fra"

[build]

[env]
  PORT = "8765"
  NODE_ENV = "production"
  AGENT_MODULES_PATH = "/nonexistent"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
