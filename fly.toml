# fly.toml app configuration file generated for wfa-bridge on 2026-03-07T16:10:39+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wfa-bridge'
primary_region = 'fra'

[build]

[mounts]
  source = 'skill_data'
  destination = '/data'

[env]
  AGENT_MODULES_PATH = '/nonexistent'
  DATA_DIR = '/data'
  NODE_ENV = 'production'
  PORT = '8765'

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
